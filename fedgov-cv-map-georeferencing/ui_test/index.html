<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Image Georeferencer</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@7.4.0/ol.css" />
  </head>
  <body>
    <h1>Image Georeferencer (OpenLayers)</h1>
    <div id="controls">
          <input type="file" id="imageInput" accept="image/*">
          <button id="startPick" disabled>Start picking GCPs</button>
          <button id="sendBtn" disabled>Send to backend</button>
          <button id="showPreviewBtn">Show Image Preview</button>
          <div id="opacityControl" style="display:flex; align-items:center; gap:0.5rem;">
            <label for="opacitySlider" style="font-size:0.9rem;">Image opacity</label>
            <input type="range" id="opacitySlider" min="0" max="1" step="0.1" value="1" />
            <span id="opacityValue" style="min-width:3ch; text-align:right;">1.00</span>
          </div>
          <button id="addMarker" disabled>Add Marker</button>
          <div id="info">Picked GCPs: <span id="count">0</span>/4+</div>
          
    </div>
    <div id="map" class="map"></div>

    <!-- Image Preview Dialog -->
    <dialog id="imgPreviewDialog" style="position: fixed; right: 1rem; top: 1rem; margin: 0; z-index: 1000; box-shadow: 0 6px 18px rgba(0,0,0,0.2); padding: 0.5rem;">
      <div style="display:flex; flex-direction:column; gap:0.5rem;">
        <h3 style="margin:0 0 0.25rem 0; font-size:1rem;">Image Preview</h3>
        <img id="imgPreview" src="" alt="Image preview" style="width:100%; height:auto; display:block; border-radius:4px;" />
        <form method="dialog" style="display:flex; justify-content:flex-end; margin:0;"></form>
          <button id="closePreviewBtn">Close</button>
          <span id="currentPickedPixel" style="flex-grow:1;"></span>
        </form>
      </div>
    </dialog>
    <div>
      <section id="gcpPanel" aria-labelledby="gcpHeading" style="margin-top:1rem;"></section>
        <h2 id="gcpHeading" style="margin:0 0 0.5rem 0; font-size:1rem;">Ground Control Points (GCPs)</h2>
        <div style="overflow:auto; max-height:240px; border:1px solid #ddd; border-radius:4px;">
          <table id="gcpTable" style="width:100%; border-collapse:collapse; min-width:640px;" aria-describedby="gcpHeading">
            <thead>
              <tr style="background:#f7f7f7; text-align:left;">
                <th style="padding:0.5rem; border-bottom:1px solid #e5e5e5;">#</th>
                <th style="padding:0.5rem; border-bottom:1px solid #e5e5e5;">Image (px)</th>
                <th style="padding:0.5rem; border-bottom:1px solid #e5e5e5;">Map (lon, lat)</th>
              </tr>
            </thead>
            <tbody>
              <tr class="gcp-empty-row">
                <td colspan="5" style="padding:1rem; color:#666;">No GCPs picked yet</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/ol@7.4.0/dist/ol.js"></script>
    <script src="app.js"></script>
  </body>
</html>
